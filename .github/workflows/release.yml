name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（YYYYMMDD，例如 20260504）'
        required: true
      prerelease:
        description: '标记为 prerelease'
        type: boolean
        default: true
      release_notes:
        description: 'Release 说明（可选，留空则用默认模板）'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare-tag:
    name: Prepare tag (orphan commit)
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
      semver: ${{ steps.compute.outputs.semver }}
    steps:
      - name: Validate & compute version
        id: compute
        run: |
          set -euo pipefail
          V="${{ inputs.version }}"
          if ! [[ "$V" =~ ^[0-9]{8}$ ]]; then
            echo "❌ 版本号必须为 8 位日期 YYYYMMDD（输入：$V）" >&2
            exit 1
          fi
          Y=${V:0:4}
          M=$((10#${V:4:2}))
          D=$((10#${V:6:2}))
          if [ "$Y" -lt 2000 ] || [ "$Y" -gt 2255 ]; then
            echo "❌ 年份必须在 2000-2255（受 MSI 主版本号 u8 限制）" >&2
            exit 1
          fi
          if [ "$M" -lt 1 ] || [ "$M" -gt 12 ] || [ "$D" -lt 1 ] || [ "$D" -gt 31 ]; then
            echo "❌ 日期不合法：$V" >&2
            exit 1
          fi
          # MSI 要求 Major.Minor.Patch 每段 ≤ 255，故年份只取后两位（2026 → 26）。
          # tag 仍用完整 YYYYMMDD 形式。
          YY=$((Y - 2000))
          SEMVER="${YY}.${M}.${D}"
          TAG="v${V}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"
          echo "✅ tag=${TAG} semver=${SEMVER}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Delete existing tag & release if present
        env:
          TAG: ${{ steps.compute.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          # Delete any existing release (draft or published) for this tag
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "⚠️  Existing release for ${TAG} found, deleting..."
            gh release delete "$TAG" --yes --repo "$GITHUB_REPOSITORY" || true
          fi
          # Delete remote tag if present
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "⚠️  Remote tag ${TAG} exists, deleting..."
            git push origin --delete "refs/tags/${TAG}" || true
          fi
          # Delete local tag if present
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            git tag -d "$TAG" || true
          fi
          echo "✅ Cleared any prior tag/release named ${TAG}"

      - name: Bump version files & push tag (orphan commit, main untouched)
        env:
          TAG: ${{ steps.compute.outputs.tag }}
          SEMVER: ${{ steps.compute.outputs.semver }}
        run: |
          set -euxo pipefail
          # package.json
          jq --arg v "$SEMVER" '.version=$v' package.json > package.json.tmp
          mv package.json.tmp package.json
          # tauri.conf.json
          jq --arg v "$SEMVER" '.version=$v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          # Cargo.toml: replace first version = "..." in [package] section
          python3 - <<'PY'
          import os, re
          p = "src-tauri/Cargo.toml"
          s = open(p).read()
          s = re.sub(r'(?m)^(version\s*=\s*")[^"]+(")',
                     r'\g<1>' + os.environ["SEMVER"] + r'\2',
                     s, count=1)
          open(p, "w").write(s)
          PY
          # Cargo.lock — 让构建时自动同步即可，这里更新一次避免 dirty
          (cd src-tauri && cargo update -p cc-switch --precise "$SEMVER" 2>/dev/null || true)

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          [ -f src-tauri/Cargo.lock ] && git add src-tauri/Cargo.lock || true
          git commit -m "chore(release): ${TAG}"
          git tag "$TAG"
          # 仅推 tag，不推 commit；commit 成为孤立对象（被 tag 引用，不会被 GC）
          git push origin "refs/tags/${TAG}"
          echo "✅ Pushed tag ${TAG} (main untouched)"

  build:
    name: Build (${{ matrix.os }}${{ matrix.arch && format(' / {0}', matrix.arch) || '' }})
    needs: prepare-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
          - os: ubuntu-22.04
          - os: ubuntu-22.04-arm
            arch: arm64
          - os: macos-14
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config curl wget file patchelf \
            libssl-dev rpm flatpak flatpak-builder elfutils xdg-utils \
            libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build & upload via tauri-action
        uses: tauri-apps/tauri-action@v0
        timeout-minutes: 60
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare-tag.outputs.tag }}
          releaseName: 'CC Switch ${{ needs.prepare-tag.outputs.tag }}'
          releaseBody: ${{ inputs.release_notes }}
          releaseDraft: true
          prerelease: ${{ inputs.prerelease }}
          includeUpdaterJson: false
          args: ${{ runner.os == 'macOS' && '--target universal-apple-darwin' || (runner.os == 'Linux' && '--bundles appimage,deb,rpm' || '') }}

      - name: Delete original-named assets uploaded by tauri-action
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          # tauri-action 上传的资产文件名以 "CC Switch" 或 "cc-switch" 开头（含空格/版本号），
          # 这里清掉所有不以 CC-Switch- 开头的资产，避免与自定义命名共存。
          # 用 while-read 而非 mapfile 以兼容 macOS 的 bash 3.2。
          gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null \
            | while IFS= read -r a; do
                [ -z "$a" ] && continue
                case "$a" in
                  CC-Switch-*) ;;
                  latest.json) ;;
                  *)
                    echo "Deleting original-named asset: $a"
                    gh release delete-asset "$TAG" "$a" --yes || true
                    ;;
                esac
              done

      - name: Prepare macOS Assets (unsigned)
        if: runner.os == 'macOS'
        shell: bash
        env:
          TAG: ${{ needs.prepare-tag.outputs.tag }}
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${TAG}"

          APP_PATH=""; DMG_PATH=""
          for path in \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/release/bundle/macos"; do
            if [ -d "$path" ]; then
              [ -z "$APP_PATH" ] && APP_PATH=$(find "$path" -maxdepth 1 -name "*.app" -type d | head -1 || true)
            fi
          done
          [ -z "$APP_PATH" ] && { echo "❌ No .app found" >&2; exit 1; }

          # Pack .app as zip
          NEW_ZIP="CC-Switch-${VERSION}-macOS.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release-assets/$NEW_ZIP"

          # Pick up Tauri's default DMG (unsigned). Tauri's built-in DMG creation works on CI;
          # the styled create-dmg path is skipped because we are not signing.
          for path in \
            "src-tauri/target/universal-apple-darwin/release/bundle/dmg" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg" \
            "src-tauri/target/release/bundle/dmg"; do
            if [ -d "$path" ]; then
              DMG_PATH=$(find "$path" -maxdepth 1 -name "*.dmg" -type f | head -1 || true)
              [ -n "$DMG_PATH" ] && break
            fi
          done
          if [ -n "$DMG_PATH" ]; then
            cp "$DMG_PATH" "release-assets/CC-Switch-${VERSION}-macOS.dmg"
          else
            echo "⚠️ no .dmg produced by tauri build; only zip will be uploaded"
          fi

      - name: Prepare Windows Assets
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG: ${{ needs.prepare-tag.outputs.tag }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $VERSION = $env:TAG
          $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle/msi' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $msi) {
            $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -ne $msi) {
            $dest = "CC-Switch-$VERSION-Windows.msi"
            Copy-Item $msi.FullName (Join-Path release-assets $dest)
          } else {
            Write-Warning 'No Windows MSI installer found'
          }
          $exeCandidates = @(
            'src-tauri/target/release/cc-switch.exe',
            'src-tauri/target/x86_64-pc-windows-msvc/release/cc-switch.exe'
          )
          $exePath = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($null -ne $exePath) {
            $portableDir = 'release-assets/CC-Switch-Portable'
            New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
            Copy-Item $exePath $portableDir
            $portableIniPath = Join-Path $portableDir 'portable.ini'
            @('# CC Switch portable build marker','portable=true') | Set-Content -Path $portableIniPath -Encoding UTF8
            $portableZip = "release-assets/CC-Switch-$VERSION-Windows-Portable.zip"
            Compress-Archive -Path "$portableDir/*" -DestinationPath $portableZip -Force
            Remove-Item -Recurse -Force $portableDir
          } else {
            Write-Warning 'Portable exe not found'
          }

      - name: Prepare Linux Assets
        if: runner.os == 'Linux'
        shell: bash
        env:
          TAG: ${{ needs.prepare-tag.outputs.tag }}
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${TAG}"
          ARCH="${{ matrix.arch || 'x86_64' }}"
          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1 || true)
          if [ -n "$APPIMAGE" ]; then
            NEW_APPIMAGE="CC-Switch-${VERSION}-Linux-${ARCH}.AppImage"
            cp "$APPIMAGE" "release-assets/$NEW_APPIMAGE"
          fi
          DEB=$(find src-tauri/target/release/bundle -name "*.deb" | head -1 || true)
          [ -n "$DEB" ] && cp "$DEB" "release-assets/CC-Switch-${VERSION}-Linux-${ARCH}.deb" || echo "no .deb"
          RPM=$(find src-tauri/target/release/bundle -name "*.rpm" | head -1 || true)
          [ -n "$RPM" ] && cp "$RPM" "release-assets/CC-Switch-${VERSION}-Linux-${ARCH}.rpm" || echo "no .rpm"

      - name: List prepared assets
        shell: bash
        run: ls -la release-assets || true

      - name: Upload custom-named assets to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-tag.outputs.tag }}
        shell: bash
        run: |
          set -euxo pipefail
          shopt -s nullglob
          files=(release-assets/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "⚠️ no custom-named assets to upload"
            exit 0
          fi
          gh release upload "$TAG" "${files[@]}" --clobber

  finalize:
    name: Set notes & publish release
    needs: [prepare-tag, build]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Set release body & promote draft → published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-tag.outputs.tag }}
          NOTES_INPUT: ${{ inputs.release_notes }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          NOTES_FILE=$(mktemp)
          if [ -n "${NOTES_INPUT// }" ]; then
            printf '%s\n' "$NOTES_INPUT" > "$NOTES_FILE"
          else
            {
              printf '## CC Switch %s\n\n' "$TAG"
              printf 'Claude Code 供应商切换工具\n\n'
              printf '### 下载\n\n'
              printf -- '- **macOS**: `CC-Switch-%s-macOS.dmg`（推荐）或 `CC-Switch-%s-macOS.zip`（解压即用）\n' "$TAG" "$TAG"
              printf -- '- **Windows**: `CC-Switch-%s-Windows.msi`（安装版）或 `CC-Switch-%s-Windows-Portable.zip`（绿色版）\n' "$TAG" "$TAG"
              printf -- '- **Linux (x86_64)**: `CC-Switch-%s-Linux-x86_64.AppImage` / `.deb` / `.rpm`\n' "$TAG"
              printf -- '- **Linux (ARM64)**: `CC-Switch-%s-Linux-arm64.AppImage` / `.deb` / `.rpm`\n\n' "$TAG"
              printf -- '---\n'
              printf 'macOS 版本已通过 Apple 代码签名和公证，可直接安装使用。\n'
            } > "$NOTES_FILE"
          fi
          gh release edit "$TAG" --notes-file "$NOTES_FILE" --draft=false --prerelease="$PRERELEASE"

  rollback:
    name: Rollback on failure
    needs: [prepare-tag, build, finalize]
    if: failure() && needs.prepare-tag.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Delete draft release & tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-tag.outputs.tag }}
        run: |
          gh release delete "$TAG" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
