name: Build Latest Deb

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: latest-deb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ubuntu-22.04-amd64-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ubuntu-22.04-amd64-pnpm-store-

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ubuntu-22.04-amd64-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ubuntu-22.04-amd64-cargo-

      - name: Install Linux system deps
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Disable updater signing for dev-channel build
        shell: bash
        run: |
          set -euxo pipefail
          # latest-deb 是非签名的开发频道构建，fork 没有 TAURI_SIGNING_PRIVATE_KEY。
          # `pnpm tauri build --config` 的覆盖不会传到 signing 步骤，直接删 updater
          # 又会让 bundler 报 "plugins > updater doesn't exist"。所以保留 updater
          # 配置块，只把 pubkey 置空、endpoints 清空，让 Tauri 跳过签名。
          # 正式签名版本仍走 release.yml。
          CFG=src-tauri/tauri.conf.json
          jq '.plugins.updater.pubkey = "" | .plugins.updater.endpoints = []' \
            "$CFG" > "$CFG.tmp"
          mv "$CFG.tmp" "$CFG"
          jq '.plugins.updater' "$CFG"

      - name: Build deb package
        shell: bash
        run: |
          set -euxo pipefail
          pnpm tauri build --bundles deb

      - name: Prepare release asset
        id: asset
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-files
          DEB_PATH=$(find src-tauri/target/release/bundle/deb -type f -name "*.deb" | head -1 || true)
          if [ -z "$DEB_PATH" ]; then
            echo "No .deb package found under src-tauri/target/release/bundle/deb" >&2
            exit 1
          fi
          DEB_NAME="cc-switch-linux-amd64-ubuntu22-latest.deb"
          cp "$DEB_PATH" "release-files/$DEB_NAME"
          echo "deb_name=$DEB_NAME" >> "$GITHUB_OUTPUT"

      - name: Delete existing latest release and tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true

      - name: Create latest tag
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Deb Build
          body: |
            ## Latest automated build

            - Commit: `${{ github.sha }}`
            - Branch: `${{ github.ref_name }}`
            - Target: `ubuntu-22.04 amd64`
            - Asset: `${{ steps.asset.outputs.deb_name }}`

            Install with:

            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/latest/${{ steps.asset.outputs.deb_name }} -O ${{ steps.asset.outputs.deb_name }}
            sudo apt install ./${{ steps.asset.outputs.deb_name }}
            ```
          files: release-files/*
          prerelease: false
          draft: false
