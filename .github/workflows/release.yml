name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（YYYYMMDD，例如 20260504）'
        required: true
      prerelease:
        description: '标记为 prerelease'
        type: boolean
        default: true
      release_notes:
        description: 'Release 说明（可选，留空则用默认模板）'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare-tag:
    name: Prepare tag (orphan commit)
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
      semver: ${{ steps.compute.outputs.semver }}
    steps:
      - name: Validate & compute version
        id: compute
        run: |
          set -euo pipefail
          V="${{ inputs.version }}"
          if ! [[ "$V" =~ ^[0-9]{8}$ ]]; then
            echo "❌ 版本号必须为 8 位日期 YYYYMMDD（输入：$V）" >&2
            exit 1
          fi
          Y=${V:0:4}
          M=$((10#${V:4:2}))
          D=$((10#${V:6:2}))
          if [ "$M" -lt 1 ] || [ "$M" -gt 12 ] || [ "$D" -lt 1 ] || [ "$D" -gt 31 ]; then
            echo "❌ 日期不合法：$V" >&2
            exit 1
          fi
          SEMVER="${Y}.${M}.${D}"
          TAG="v${V}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"
          echo "✅ tag=${TAG} semver=${SEMVER}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fail if tag already exists
        env:
          TAG: ${{ steps.compute.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "❌ Tag ${TAG} 已存在，先删除或换一个版本号" >&2
            exit 1
          fi

      - name: Bump version files & push tag (orphan commit, main untouched)
        env:
          TAG: ${{ steps.compute.outputs.tag }}
          SEMVER: ${{ steps.compute.outputs.semver }}
        run: |
          set -euxo pipefail
          # package.json
          jq --arg v "$SEMVER" '.version=$v' package.json > package.json.tmp
          mv package.json.tmp package.json
          # tauri.conf.json
          jq --arg v "$SEMVER" '.version=$v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          # Cargo.toml: replace first version = "..." in [package] section
          python3 - <<'PY'
          import os, re
          p = "src-tauri/Cargo.toml"
          s = open(p).read()
          s = re.sub(r'(?m)^(version\s*=\s*")[^"]+(")',
                     r'\g<1>' + os.environ["SEMVER"] + r'\2',
                     s, count=1)
          open(p, "w").write(s)
          PY
          # Cargo.lock — 让构建时自动同步即可，这里更新一次避免 dirty
          (cd src-tauri && cargo update -p cc-switch --precise "$SEMVER" 2>/dev/null || true)

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          [ -f src-tauri/Cargo.lock ] && git add src-tauri/Cargo.lock || true
          git commit -m "chore(release): ${TAG}"
          git tag "$TAG"
          # 仅推 tag，不推 commit；commit 成为孤立对象（被 tag 引用，不会被 GC）
          git push origin "refs/tags/${TAG}"
          echo "✅ Pushed tag ${TAG} (main untouched)"

  build:
    name: Build (${{ matrix.os }}${{ matrix.arch && format(' / {0}', matrix.arch) || '' }})
    needs: prepare-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
          - os: ubuntu-22.04
          - os: ubuntu-22.04-arm
            arch: arm64
          - os: macos-14
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config curl wget file patchelf \
            libssl-dev rpm flatpak flatpak-builder elfutils xdg-utils \
            libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Prepare Tauri signing key
        shell: bash
        run: |
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "❌ TAURI_SIGNING_PRIVATE_KEY Secret 为空或不存在" >&2
            exit 1
          fi
          RAW="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          KEY_PATH="$RUNNER_TEMP/tauri_signing.key"
          if echo "$RAW" | head -n1 | grep -q '^untrusted comment:'; then
            printf '%s\n' "$RAW" > "$KEY_PATH"
          else
            if DECODED=$(printf '%s' "$RAW" | (base64 --decode 2>/dev/null || base64 -D 2>/dev/null)) \
               && echo "$DECODED" | head -n1 | grep -q '^untrusted comment:'; then
              printf '%s\n' "$DECODED" > "$KEY_PATH"
            else
              if echo "$RAW" | grep -Eq '^[A-Za-z0-9+/=]+$'; then
                ONE=$(printf '%s' "$RAW" | tr -d '\r\n')
                printf '%s\n%s\n' "untrusted comment: tauri signing key" "$ONE" > "$KEY_PATH"
              else
                echo "❌ TAURI_SIGNING_PRIVATE_KEY 格式无法识别" >&2
                exit 1
              fi
            fi
          fi
          if command -v base64 >/dev/null 2>&1; then
            KEY_B64=$(base64 < "$KEY_PATH" | tr -d '\r\n')
          elif command -v openssl >/dev/null 2>&1; then
            KEY_B64=$(openssl base64 -A -in "$KEY_PATH")
          else
            KEY_B64=$(KEY_PATH="$KEY_PATH" node -e "process.stdout.write(require('fs').readFileSync(process.env.KEY_PATH).toString('base64'))")
          fi
          [ -z "$KEY_B64" ] && { echo "❌ 无法生成私钥 base64 内容" >&2; exit 1; }
          echo "TAURI_SIGNING_PRIVATE_KEY=$KEY_B64" >> "$GITHUB_ENV"
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          fi
          echo "✅ Tauri signing key prepared"

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          printf '%s' "${{ secrets.APPLE_CERTIFICATE }}" | (base64 --decode 2>/dev/null || base64 -D) > "$CERT_PATH"
          ORIGINAL_DEFAULT_KEYCHAIN=$(security default-keychain -d user | tr -d '"' | xargs)
          echo "ORIGINAL_DEFAULT_KEYCHAIN=$ORIGINAL_DEFAULT_KEYCHAIN" >> "$GITHUB_ENV"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | grep -oE '"[^"]+"' | head -1 | tr -d '"')
          if [ -z "$IDENTITY" ]; then
            echo "❌ No 'Developer ID Application' identity found" >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "✅ Signing identity: $IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          rm -f "$CERT_PATH"

      - name: Build & upload via tauri-action
        uses: tauri-apps/tauri-action@v0
        timeout-minutes: 60
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ needs.prepare-tag.outputs.tag }}
          releaseName: 'CC Switch ${{ needs.prepare-tag.outputs.tag }}'
          releaseBody: ${{ inputs.release_notes }}
          releaseDraft: true
          prerelease: ${{ inputs.prerelease }}
          includeUpdaterJson: false
          args: ${{ runner.os == 'macOS' && '--target universal-apple-darwin' || (runner.os == 'Linux' && '--bundles appimage,deb,rpm' || '') }}

      - name: Delete original-named assets uploaded by tauri-action
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          # tauri-action 上传的资产文件名以 "CC Switch" 或 "cc-switch" 开头（含空格/版本号），
          # 这里清掉所有不以 CC-Switch- 开头的资产，避免与自定义命名共存
          mapfile -t assets < <(gh release view "$TAG" --json assets --jq '.assets[].name' || true)
          for a in "${assets[@]}"; do
            case "$a" in
              CC-Switch-*) ;;
              latest.json) ;;
              *)
                echo "Deleting original-named asset: $a"
                gh release delete-asset "$TAG" "$a" --yes || true
                ;;
            esac
          done

      - name: Prepare macOS Assets (styled DMG, rename, double-notarize)
        if: runner.os == 'macOS'
        shell: bash
        env:
          TAG: ${{ needs.prepare-tag.outputs.tag }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${TAG}"

          TAR_GZ=""; APP_PATH=""
          for path in \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/release/bundle/macos"; do
            if [ -d "$path" ]; then
              [ -z "$TAR_GZ" ]   && TAR_GZ=$(find "$path" -maxdepth 1 -name "*.tar.gz" -type f | head -1 || true)
              [ -z "$APP_PATH" ] && APP_PATH=$(find "$path" -maxdepth 1 -name "*.app" -type d | head -1 || true)
            fi
          done
          [ -z "$TAR_GZ" ]   && { echo "❌ No macOS .tar.gz updater artifact" >&2; exit 1; }
          [ -z "$APP_PATH" ] && { echo "❌ No .app found" >&2; exit 1; }

          xcrun stapler staple "$APP_PATH"

          NEW_TAR_GZ="CC-Switch-${VERSION}-macOS.tar.gz"
          cp "$TAR_GZ" "release-assets/$NEW_TAR_GZ"
          [ -f "$TAR_GZ.sig" ] && cp "$TAR_GZ.sig" "release-assets/$NEW_TAR_GZ.sig" || echo "no .sig for $TAR_GZ"

          NEW_ZIP="CC-Switch-${VERSION}-macOS.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release-assets/$NEW_ZIP"

          [ -z "${APPLE_SIGNING_IDENTITY:-}" ] && { echo "❌ APPLE_SIGNING_IDENTITY missing" >&2; exit 1; }
          HOMEBREW_NO_AUTO_UPDATE=1 brew install create-dmg
          NEW_DMG="CC-Switch-${VERSION}-macOS.dmg"
          DMG_STAGE_DIR="$RUNNER_TEMP/dmg-stage"
          rm -rf "$DMG_STAGE_DIR"; mkdir -p "$DMG_STAGE_DIR"
          ditto "$APP_PATH" "$DMG_STAGE_DIR/CC Switch.app"
          create-dmg \
            --volname "CC Switch" \
            --background "src-tauri/icons/dmg-background.png" \
            --window-size 660 400 \
            --window-pos 200 120 \
            --icon-size 80 \
            --icon "CC Switch.app" 180 220 \
            --hide-extension "CC Switch.app" \
            --app-drop-link 480 220 \
            --codesign "$APPLE_SIGNING_IDENTITY" \
            --no-internet-enable \
            "release-assets/$NEW_DMG" \
            "$DMG_STAGE_DIR"
          rm -rf "$DMG_STAGE_DIR"

          # Notarize the DMG
          DMG_PATH="release-assets/$NEW_DMG"
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            if xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait; then
              xcrun stapler staple "$DMG_PATH"
              break
            fi
            [ "$attempt" -eq "$max_attempts" ] && { echo "❌ DMG notarization failed" >&2; exit 1; }
            sleep $((attempt * 60))
          done

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl -a -t exec -vv "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"
          spctl -a -t open --context context:primary-signature -vv "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Prepare Windows Assets
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG: ${{ needs.prepare-tag.outputs.tag }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $VERSION = $env:TAG
          $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle/msi' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $msi) {
            $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -ne $msi) {
            $dest = "CC-Switch-$VERSION-Windows.msi"
            Copy-Item $msi.FullName (Join-Path release-assets $dest)
            $sigPath = "$($msi.FullName).sig"
            if (Test-Path $sigPath) {
              Copy-Item $sigPath (Join-Path release-assets ("$dest.sig"))
            }
          } else {
            Write-Warning 'No Windows MSI installer found'
          }
          $exeCandidates = @(
            'src-tauri/target/release/cc-switch.exe',
            'src-tauri/target/x86_64-pc-windows-msvc/release/cc-switch.exe'
          )
          $exePath = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($null -ne $exePath) {
            $portableDir = 'release-assets/CC-Switch-Portable'
            New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
            Copy-Item $exePath $portableDir
            $portableIniPath = Join-Path $portableDir 'portable.ini'
            @('# CC Switch portable build marker','portable=true') | Set-Content -Path $portableIniPath -Encoding UTF8
            $portableZip = "release-assets/CC-Switch-$VERSION-Windows-Portable.zip"
            Compress-Archive -Path "$portableDir/*" -DestinationPath $portableZip -Force
            Remove-Item -Recurse -Force $portableDir
          } else {
            Write-Warning 'Portable exe not found'
          }

      - name: Prepare Linux Assets
        if: runner.os == 'Linux'
        shell: bash
        env:
          TAG: ${{ needs.prepare-tag.outputs.tag }}
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${TAG}"
          ARCH="${{ matrix.arch || 'x86_64' }}"
          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1 || true)
          if [ -n "$APPIMAGE" ]; then
            NEW_APPIMAGE="CC-Switch-${VERSION}-Linux-${ARCH}.AppImage"
            cp "$APPIMAGE" "release-assets/$NEW_APPIMAGE"
            [ -f "$APPIMAGE.sig" ] && cp "$APPIMAGE.sig" "release-assets/$NEW_APPIMAGE.sig" || echo "no .sig for AppImage"
          fi
          DEB=$(find src-tauri/target/release/bundle -name "*.deb" | head -1 || true)
          [ -n "$DEB" ] && cp "$DEB" "release-assets/CC-Switch-${VERSION}-Linux-${ARCH}.deb" || echo "no .deb"
          RPM=$(find src-tauri/target/release/bundle -name "*.rpm" | head -1 || true)
          [ -n "$RPM" ] && cp "$RPM" "release-assets/CC-Switch-${VERSION}-Linux-${ARCH}.rpm" || echo "no .rpm"

      - name: List prepared assets
        shell: bash
        run: ls -la release-assets || true

      - name: Upload custom-named assets to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-tag.outputs.tag }}
        shell: bash
        run: |
          set -euxo pipefail
          shopt -s nullglob
          files=(release-assets/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "⚠️ no custom-named assets to upload"
            exit 0
          fi
          gh release upload "$TAG" "${files[@]}" --clobber

      - name: Upload .sig artifacts (for latest.json job)
        uses: actions/upload-artifact@v7
        with:
          name: sigs-${{ runner.os }}-${{ matrix.arch || runner.arch }}
          path: release-assets/*.sig
          if-no-files-found: ignore

      - name: Clean up Apple signing keychain
        if: runner.os == 'macOS' && always()
        shell: bash
        run: |
          if [ -n "${ORIGINAL_DEFAULT_KEYCHAIN:-}" ]; then
            security default-keychain -s "$ORIGINAL_DEFAULT_KEYCHAIN" || true
          fi
          if [ -f "$RUNNER_TEMP/build.keychain-db" ]; then
            security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
          fi

  finalize:
    name: Assemble latest.json & publish
    needs: [prepare-tag, build]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download .sig artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: sigs-*
          path: sigs
          merge-multiple: true

      - name: List downloaded sigs
        run: ls -la sigs || true

      - name: Generate latest.json from sig contents + asset URLs
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare-tag.outputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          base_url="https://github.com/$REPO/releases/download/$TAG"

          mac_url=""; mac_sig=""
          win_url=""; win_sig=""
          linux_x64_url=""; linux_x64_sig=""
          linux_arm64_url=""; linux_arm64_sig=""

          shopt -s nullglob
          for sig in sigs/*.sig; do
            base=${sig%.sig}
            fname=$(basename "$base")
            url="$base_url/$fname"
            sig_content=$(cat "$sig")
            case "$fname" in
              *.tar.gz)
                mac_url="$url"; mac_sig="$sig_content";;
              *-Linux-arm64.AppImage|*-Linux-arm64.appimage)
                linux_arm64_url="$url"; linux_arm64_sig="$sig_content";;
              *-Linux-x86_64.AppImage|*-Linux-x86_64.appimage)
                linux_x64_url="$url"; linux_x64_sig="$sig_content";;
              *.msi|*.exe)
                win_url="$url"; win_sig="$sig_content";;
            esac
          done

          tmp_json=$(mktemp)
          {
            echo '{'
            echo "  \"version\": \"$VERSION\","
            echo "  \"notes\": \"Release $TAG\","
            echo "  \"pub_date\": \"$PUB_DATE\","
            echo '  "platforms": {'
            first=1
            if [ -n "$mac_url" ] && [ -n "$mac_sig" ]; then
              for key in darwin-aarch64 darwin-x86_64; do
                [ $first -eq 0 ] && echo ','
                echo "    \"$key\": {\"signature\": \"$mac_sig\", \"url\": \"$mac_url\"}"
                first=0
              done
            fi
            if [ -n "$win_url" ] && [ -n "$win_sig" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"windows-x86_64\": {\"signature\": \"$win_sig\", \"url\": \"$win_url\"}"
              first=0
            fi
            if [ -n "$linux_x64_url" ] && [ -n "$linux_x64_sig" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"linux-x86_64\": {\"signature\": \"$linux_x64_sig\", \"url\": \"$linux_x64_url\"}"
              first=0
            fi
            if [ -n "$linux_arm64_url" ] && [ -n "$linux_arm64_sig" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"linux-aarch64\": {\"signature\": \"$linux_arm64_sig\", \"url\": \"$linux_arm64_url\"}"
              first=0
            fi
            echo '  }'
            echo '}'
          } > "$tmp_json"
          echo "Generated latest.json:"; cat "$tmp_json"
          mv "$tmp_json" latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-tag.outputs.tag }}
        run: gh release upload "$TAG" latest.json --clobber --repo "$GITHUB_REPOSITORY"

      - name: Set release body & promote draft → published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-tag.outputs.tag }}
          NOTES_INPUT: ${{ inputs.release_notes }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          NOTES_FILE=$(mktemp)
          if [ -n "${NOTES_INPUT// }" ]; then
            printf '%s\n' "$NOTES_INPUT" > "$NOTES_FILE"
          else
            {
              printf '## CC Switch %s\n\n' "$TAG"
              printf 'Claude Code 供应商切换工具\n\n'
              printf '### 下载\n\n'
              printf -- '- **macOS**: `CC-Switch-%s-macOS.dmg`（推荐）或 `CC-Switch-%s-macOS.zip`（解压即用）\n' "$TAG" "$TAG"
              printf -- '- **Windows**: `CC-Switch-%s-Windows.msi`（安装版）或 `CC-Switch-%s-Windows-Portable.zip`（绿色版）\n' "$TAG" "$TAG"
              printf -- '- **Linux (x86_64)**: `CC-Switch-%s-Linux-x86_64.AppImage` / `.deb` / `.rpm`\n' "$TAG"
              printf -- '- **Linux (ARM64)**: `CC-Switch-%s-Linux-arm64.AppImage` / `.deb` / `.rpm`\n\n' "$TAG"
              printf '> `.tar.gz` 为 Tauri updater 自动更新专用，无需手动下载。\n\n'
              printf -- '---\n'
              printf 'macOS 版本已通过 Apple 代码签名和公证，可直接安装使用。\n'
            } > "$NOTES_FILE"
          fi
          gh release edit "$TAG" --notes-file "$NOTES_FILE" --draft=false --prerelease="$PRERELEASE"

  rollback:
    name: Rollback on failure
    needs: [prepare-tag, build, finalize]
    if: failure() && needs.prepare-tag.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Delete draft release & tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare-tag.outputs.tag }}
        run: |
          gh release delete "$TAG" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
